<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comustock :: Agentes</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
      :root {
        --bg: #01284a;
        --bg-2: #001f3a;
        --panel: #072f57;
        --panel-2: #0b3967;
        --panel-soft: rgba(8, 47, 87, 0.92);
        --text: #f4f7fb;
        --muted: #b7c5d8;
        --placeholder: #7d91ab;
        --border: rgba(123, 158, 198, 0.28);
        --accent: #e10098;
        --accent-2: #ff27b8;
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
        --radius: 22px;
        --user-bubble: #0b335d;
        --assistant-bubble: #062947;
        --typing-dot: #d7e3f1;
        --max-w: 980px;
        --composer-w: 860px;
        --messages-w: 820px;
        --dock-h: 180px;
        --composer-bottom-offset: 50px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(0, 89, 173, 0.18), transparent 34%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      }

      body {
        padding: 24px 20px;
        overflow: hidden;
      }

      .app {
        width: min(var(--max-w), 100%);
        height: 100vh;
        min-height: 100vh;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: translateY(-10px);
        pointer-events: none;
        transition:
          opacity 0.28s ease,
          transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .app.is-chatting .topbar {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .app.is-returning .topbar {
        opacity: 0;
        transform: translateY(-10px);
        pointer-events: none;
      }

      .brand,
      .eyebrow {
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text);
        opacity: 0.92;
        display: none;
      }

      .viewport {
        position: relative;
        min-height: 0;
        overflow: hidden;
      }

      .intro {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        z-index: 3;
        transition:
          opacity 0.28s ease,
          transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .app.is-chatting .intro,
      .app.is-transitioning .intro {
        opacity: 0;
        transform: translateY(0);
        pointer-events: none;
      }

      .app.is-returning .intro {
        opacity: 1;
        transform: translateY(0);
        pointer-events: none;
      }

      .welcome {
        width: min(var(--composer-w), 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 10px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(38px, 6vw, 64px);
        line-height: 0.98;
        font-weight: 500;
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 0;
        font-size: clamp(15px, 2vw, 18px);
        color: var(--muted);
      }

      .footer-note {
        text-align: center;
        font-size: 13px;
        color: var(--muted);
        opacity: 0.9;
      }

      .footer-note a {
        color: var(--text);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .slot {
        width: min(var(--composer-w), 100%);
        display: flex;
        justify-content: center;
      }

      .starter-tools {
        width: min(var(--composer-w), 100%);
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: flex-start;
        transition:
          opacity 0.22s ease,
          transform 0.32s ease;
      }

      .app.is-chatting .starter-tools,
      .app.is-transitioning .starter-tools {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
      }

      .starter-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding-left: 19px;
      }

      .starter-chip {
        border: 1px solid var(--border);
        background: rgba(10, 56, 99, 0.9);
        color: var(--muted);
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
        font: inherit;
      }

      .starter-chip:hover,
      .starter-chip.is-active {
        transform: translateY(-1px);
        background: rgba(15, 69, 120, 0.98);
        color: var(--text);
      }

      .starter-dropdown {
        position: relative;
        width: min(760px, 100%);
        margin-left: 19px;
        background: linear-gradient(180deg,
            rgba(15, 62, 109, 0.98),
            rgba(8, 47, 87, 0.98));
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: var(--shadow);
        overflow: hidden;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        max-height: 0;
        transform: translateY(8px) scale(0.985);
        transform-origin: top left;
        transition:
          opacity 0.22s ease,
          transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          visibility 0.22s ease,
          max-height 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .starter-dropdown.is-open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        max-height: 420px;
        transform: translateY(0) scale(1);
      }

      .starter-dropdown[hidden] {
        display: block;
      }

      .starter-dropdown-close {
        position: absolute;
        top: 14px;
        right: 14px;
        border: 0;
        border-radius: 10px;
        background: rgba(10, 56, 99, 0.14);
        color: var(--muted);
        font: inherit;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        padding: 4px 10px 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          color 0.2s ease,
          opacity 0.2s ease;
      }

      .starter-dropdown-close:hover {
        transform: translateY(-1px);
        background: rgba(15, 69, 120, 0.98);
        color: var(--text);
      }

      .starter-list {
        display: flex;
        flex-direction: column;
        padding: 18px 18px 14px;
      }

      .starter-item {
        border: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 18px;
        text-align: left;
        padding: 18px 0;
        border-top: 1px solid rgba(123, 158, 198, 0.16);
        cursor: pointer;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .starter-item:first-child {
        border-top: 0;
        padding-top: 10px;
      }

      .starter-item:hover {
        opacity: 1;
        transform: translateX(2px);
      }

      .conversation {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: calc(var(--dock-h) + var(--composer-bottom-offset) + 12px);
        overflow-y: auto;
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px);
        transition:
          opacity 0.3s ease,
          transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
        scrollbar-width: thin;
        overscroll-behavior: contain;
        z-index: 1;
      }

      .app.is-chatting .conversation {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .app.is-returning .conversation {
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px);
      }

      .messages {
        width: min(var(--messages-w), 100%);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 8px 0 24px;
      }

      .message-row {
        display: flex;
        width: 100%;
        animation: riseIn 0.22s ease;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-row.assistant {
        justify-content: flex-start;
      }

      .message-bubble {
        max-width: min(720px, 85%);
        padding: 15px 18px;
        border-radius: 20px;
        line-height: 1.5;
        font-size: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      }

      .message-row.user .message-bubble {
        background: var(--user-bubble);
      }

      .message-row.assistant .message-bubble {
        background: var(--assistant-bubble);
      }

      .message-row.typing .message-bubble {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 74px;
      }

      .typing-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--typing-dot);
        opacity: 0.42;
        animation: blink 1.1s infinite ease-in-out;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.16s;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 0.32s;
      }

      .dock {
        position: absolute;
        left: 0;
        right: 0;
        bottom: var(--composer-bottom-offset);
        padding-top: 10px;
        background: none;
        z-index: 4;
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.22s ease;
      }

      .app.is-returning .dock {
        opacity: 0;
        pointer-events: none;
      }

      .dock-slot {
        width: min(var(--composer-w), 100%);
        margin: 0 auto;
        min-height: 1px;
        pointer-events: auto;
      }

      .composer-shell {
        width: min(var(--composer-w), 100%);
        margin: 0 auto;
      }

      .prompt-wrap {
        background: linear-gradient(180deg,
            rgba(15, 62, 109, 0.98),
            rgba(8, 47, 87, 0.98));
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) + 10px);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }

      .prompt-box {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 18px;
        background: var(--panel-soft);
      }

      .clear-icon {
        position: absolute;
        top: 17px;
        right: 23px;
        border: 0;
        border-radius: 10px;
        background: rgba(10, 56, 99, 0.14);
        color: var(--muted);
        font: inherit;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        padding: 4px 10px 8px;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          opacity 0.2s ease;
      }

      .clear-icon:hover {
        opacity: 1;
        transform: translateY(-1px);
        background: rgba(15, 69, 120, 0.98);
        border-color: var(--border);
        color: var(--text);
      }

      textarea {
        width: 100%;
        min-height: 88px;
        max-height: 220px;
        resize: none;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 18px;
        line-height: 1.5;
        overflow-y: auto;
        padding-right: 44px;
      }

      textarea::placeholder {
        color: var(--placeholder);
      }

      .bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        padding-top: 2px;
      }

      .attach-wrap {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
      }

      .icon-btn,
      .send-btn {
        border: 1px solid var(--border);
        border-radius: 999px;
        height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 56, 99, 0.9);
        color: var(--text);
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          border-color 0.2s ease,
          opacity 0.2s ease;
        font: inherit;
      }

      .icon-btn {
        width: 46px;
        font-size: 18px;
      }

      .send-btn {
        padding: 0 18px;
        gap: 10px;
        font-weight: 600;
        background: linear-gradient(180deg, var(--accent-2), var(--accent));
        color: #ffffff;
        border-color: rgba(255, 69, 190, 0.45);
        box-shadow: 0 10px 28px rgba(225, 0, 152, 0.22);
      }

      .icon-btn:hover,
      .send-btn:hover {
        transform: translateY(-1px);
      }

      .icon-btn.is-active,
      .starter-chip.is-active {
        background: rgba(15, 69, 120, 0.98);
        color: var(--text);
        border-color: rgba(123, 158, 198, 0.42);
        transform: translateY(-1px);
      }

      .send-btn:hover {
        background: linear-gradient(180deg, #ff3bc0, #df008f);
      }

      .send-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .attach-menu {
        position: absolute;
        left: 0;
        bottom: calc(100% + 10px);
        min-width: 220px;
        background: linear-gradient(180deg,
            rgba(15, 62, 109, 0.98),
            rgba(8, 47, 87, 0.98));
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        overflow: hidden;
        z-index: 8;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateY(8px) scale(0.985);
        transform-origin: bottom left;
        transition:
          opacity 0.22s ease,
          transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
          visibility 0.22s ease;
      }

      .attach-menu.is-open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: translateY(0) scale(1);
      }

      .attach-menu[hidden] {
        display: block;
      }

      .attach-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 16px;
        text-align: left;
        padding: 14px 16px;
        cursor: pointer;
        transition: background 0.18s ease;
      }

      .attach-item+.attach-item {
        border-top: 1px solid rgba(123, 158, 198, 0.16);
      }

      .attach-item:hover {
        background: rgba(15, 69, 120, 0.78);
      }

      .composer-floating {
        position: fixed;
        z-index: 9999;
        margin: 0;
        pointer-events: none;
      }

      .composer-floating textarea,
      .composer-floating button,
      .composer-floating .attach-menu {
        pointer-events: none;
      }

      @keyframes blink {

        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }

        40% {
          opacity: 1;
          transform: translateY(-1px);
        }
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 16px 14px;
        }

        .app {
          height: calc(100vh - 32px);
          min-height: calc(100vh - 32px);
        }

        .prompt-box {
          padding: 16px;
        }

        textarea {
          min-height: 72px;
          font-size: 16px;
        }

        .bottom {
          align-items: stretch;
        }

        .actions {
          width: 100%;
          justify-content: flex-end;
        }

        .starter-dropdown {
          width: 100%;
        }

        .message-bubble {
          max-width: 92%;
        }
      }

    </style>
  </head>

  <body>
    <main class="app" id="app">
      <header class="topbar">
        <div class="brand">Asistente</div>
      </header>

      <section class="viewport" id="viewport">
        <section class="intro" id="intro">
          <div class="welcome">
            <div class="eyebrow">Asistente</div>
            <h1 id="welcomeTitle">Hola, Benja.</h1>
          </div>

          <div class="slot" id="introSlot"></div>

          <div class="starter-tools" id="starterTools">
            <div class="starter-buttons" id="starterButtons">
              <button class="starter-chip" type="button" data-group="analizar">Analizar</button>
              <button class="starter-chip" type="button" data-group="escribir">Escribir</button>
              <button class="starter-chip" type="button" data-group="planificar">Planificar</button>
            </div>

            <div class="starter-dropdown" id="starterDropdown" hidden>
              <button class="starter-dropdown-close" id="starterDropdownClose" type="button"
                aria-label="Cerrar">×</button>
              <div class="starter-list" id="starterList"></div>
            </div>
          </div>

          <div class="footer-note">Si tenés alguna consulta, contactate con el equipo de <a
              href="mailto:comunicacioninterna@personal.com.ar">Comunicación Interna</a>.</div>
        </section>

        <section class="conversation" id="conversation">
          <div class="messages" id="messages"></div>
        </section>

        <section class="dock" id="dock">
          <div class="dock-slot" id="dockSlot"></div>
        </section>
      </section>
    </main>

    <template id="composerTemplate">
      <div class="composer-shell" id="composerShell">
        <div class="prompt-wrap">
          <form class="prompt-box" id="composerForm">
            <button class="clear-icon" id="clearBtn" type="button" aria-label="Limpiar">×</button>
            <textarea id="composerInput" placeholder="¿Cómo puedo ayudarte?"></textarea>
            <div class="bottom">
              <div class="attach-wrap">
                <button class="icon-btn" id="attachBtn" type="button" aria-label="Agregar contenido">＋</button>
                <div class="attach-menu" id="attachMenu" hidden>
                  <button class="attach-item" type="button" data-attach="documento">Agregar documento</button>
                  <button class="attach-item" type="button" data-attach="imagen">Agregar imagen</button>
                </div>
              </div>
              <div class="actions">
                <button class="send-btn" id="sendBtn" type="submit">Enviar →</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </template>

    <!-- js/state.js -->
    <script>// Estado global de la aplicación
      let typingTimeout = null;
      let attachMenuTimeout = null;
      let starterDropdownTimeout = null;
      let isAwaitingResponse = false;
      let isTransitioning = false;
      let isLockedUntilReplyFinishes = false;
      let activeStarterGroup = null;
    </script>
    <!-- js/ui.js -->
    <script>// Referencias al DOM
      const app = document.getElementById("app");
      const introSlot = document.getElementById("introSlot");
      const welcomeTitle = document.getElementById("welcomeTitle");
      const dockSlot = document.getElementById("dockSlot");
      const messages = document.getElementById("messages");
      const template = document.getElementById("composerTemplate");
      const starterDropdown = document.getElementById("starterDropdown");
      const starterDropdownClose = document.getElementById("starterDropdownClose");
      const starterList = document.getElementById("starterList");
      const starterButtons = Array.from(document.querySelectorAll(".starter-chip"));

      // Instanciar composer desde template
      const composerShell = template.content.firstElementChild.cloneNode(true);
      introSlot.appendChild(composerShell);

      const composerForm = composerShell.querySelector("#composerForm");
      const composerInput = composerShell.querySelector("#composerInput");
      const sendBtn = composerShell.querySelector("#sendBtn");
      const clearBtn = composerShell.querySelector("#clearBtn");
      const attachBtn = composerShell.querySelector("#attachBtn");
      const attachMenu = composerShell.querySelector("#attachMenu");
      const attachItems = Array.from(composerShell.querySelectorAll("[data-attach]"));

      // ─── Helpers de estado de UI ───────────────────────────────────────────────

      function isChatting() {
        return app.classList.contains("is-chatting");
      }

      function getTimeBasedGreeting() {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 12) return "¡Buen día, Benja!";
        if (hour >= 12 && hour < 20) return "¡Buenas tardes, Benja!";
        return "¡Buenas noches, Benja!";
      }

      function setRandomGreeting() {
        const greeting = RANDOM_GREETINGS[Math.floor(Math.random() * RANDOM_GREETINGS.length)];
        welcomeTitle.textContent = greeting === "__TIME_BASED__" ? getTimeBasedGreeting() : greeting;
      }

      function toggleSendState() {
        sendBtn.disabled =
          isLockedUntilReplyFinishes ||
          isAwaitingResponse ||
          isTransitioning ||
          !composerInput.value.trim();
      }

      // ─── Resize y métricas del dock ───────────────────────────────────────────

      function updateDockMetrics() {
        requestAnimationFrame(() => {
          const dockHeight =
            Math.ceil(document.getElementById("dock").getBoundingClientRect().height) || 180;
          app.style.setProperty("--dock-h", `${dockHeight}px`);
        });
      }

      function autoResize() {
        composerInput.style.height = "auto";
        composerInput.style.height = Math.min(composerInput.scrollHeight, 220) + "px";
        updateDockMetrics();
      }

      // ─── Mensajes ─────────────────────────────────────────────────────────────

      function scrollToBottom() {
        requestAnimationFrame(() => {
          const conv = document.querySelector(".conversation");
          conv.scrollTop = conv.scrollHeight;
        });
      }

      function createMessageRow(role, text, isTyping = false) {
        const row = document.createElement("div");
        row.className = `message-row ${role}${isTyping ? " typing" : ""}`;

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";

        if (isTyping) {
          bubble.innerHTML = `
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    `;
        } else {
          bubble.textContent = text;
        }

        row.appendChild(bubble);
        return row;
      }

      function appendMessage(role, text, options = {}) {
        const row = createMessageRow(role, text, options.typing);
        messages.appendChild(row);
        scrollToBottom();
        return row;
      }

      // ─── Persistencia (deshabilitada) ─────────────────────────────────────────

      function getStoredMessages() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveMessages() {
        // localStorage deshabilitado temporalmente
      }

      function loadMessages() {
        const stored = getStoredMessages();
        if (!stored.length) {
          autoResize();
          toggleSendState();
          return;
        }

        stored.forEach((item) => {
          messages.appendChild(createMessageRow(item.role, item.text));
        });

        enterChatModeWithoutAnimation();
        scrollToBottom();
        autoResize();
        toggleSendState();
      }
    </script>

    <script>// ─── Attach menu ──────────────────────────────────────────────────────────

      function openAttachMenu() {
        clearTimeout(attachMenuTimeout);
        attachMenu.hidden = false;
        requestAnimationFrame(() => attachMenu.classList.add("is-open"));
        attachBtn.classList.add("is-active");
      }

      function closeAttachMenu() {
        clearTimeout(attachMenuTimeout);
        attachMenu.classList.remove("is-open");
        attachBtn.classList.remove("is-active");
        attachMenuTimeout = setTimeout(() => {
          attachMenu.hidden = true;
        }, 220);
      }

      function toggleAttachMenu() {
        if (attachMenu.hidden || !attachMenu.classList.contains("is-open")) {
          openAttachMenu();
        } else {
          closeAttachMenu();
        }
      }

      // ─── Starter dropdown ─────────────────────────────────────────────────────

      function closeStarterDropdown() {
        clearTimeout(starterDropdownTimeout);
        starterDropdown.classList.remove("is-open");
        activeStarterGroup = null;
        starterButtons.forEach((button) => button.classList.remove("is-active"));
        starterDropdownTimeout = setTimeout(() => {
          starterDropdown.hidden = true;
        }, 220);
      }

      function openStarterDropdown(group) {
        const preset = STARTER_PRESETS[group];
        if (!preset) return;

        activeStarterGroup = group;
        starterButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.group === group);
        });

        starterList.innerHTML = "";

        preset.items.forEach((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "starter-item";
          button.textContent = item;
          button.addEventListener("click", () => {
            composerInput.value = item;
            autoResize();
            toggleSendState();
            closeStarterDropdown();
            composerInput.focus();
            composerInput.setSelectionRange(composerInput.value.length, composerInput.value.length);
          });
          starterList.appendChild(button);
        });

        clearTimeout(starterDropdownTimeout);
        starterDropdown.hidden = false;
        requestAnimationFrame(() => starterDropdown.classList.add("is-open"));
      }

      function toggleStarterDropdown(group) {
        if (activeStarterGroup === group && !starterDropdown.hidden) {
          closeStarterDropdown();
          return;
        }
        openStarterDropdown(group);
      }

      // ─── Animaciones de transición del composer ───────────────────────────────

      function computeDockRect() {
        const appRect = app.getBoundingClientRect();
        const shellRect = composerShell.getBoundingClientRect();
        const finalWidth = Math.min(860, appRect.width);
        return {
          left: appRect.left + (appRect.width - finalWidth) / 2,
          top:
            appRect.bottom -
            shellRect.height -
            parseFloat(getComputedStyle(app).getPropertyValue("--composer-bottom-offset") || "0"),
          width: finalWidth,
        };
      }

      function computeIntroRect() {
        const slotRect = introSlot.getBoundingClientRect();
        const shellRect = composerShell.getBoundingClientRect();
        const finalWidth = slotRect.width || shellRect.width;
        return {
          left: slotRect.left + (slotRect.width - finalWidth) / 2,
          top: slotRect.top,
          width: finalWidth,
        };
      }

      function enterChatModeWithoutAnimation() {
        dockSlot.appendChild(composerShell);
        app.classList.remove("is-transitioning");
        app.classList.add("is-chatting");
        updateDockMetrics();
        toggleSendState();
        closeStarterDropdown();
      }

      function transitionToChatMode() {
        if (isChatting() || isTransitioning) return Promise.resolve();

        isTransitioning = true;
        toggleSendState();
        closeStarterDropdown();
        closeAttachMenu();

        const startRect = composerShell.getBoundingClientRect();
        introSlot.style.minHeight = `${Math.ceil(startRect.height)}px`;
        const endRect = computeDockRect();

        composerShell.classList.add("composer-floating");
        composerShell.style.left = `${startRect.left}px`;
        composerShell.style.top = `${startRect.top}px`;
        composerShell.style.width = `${startRect.width}px`;
        composerShell.style.position = "fixed";

        document.body.appendChild(composerShell);
        app.classList.add("is-transitioning");

        return new Promise((resolve) => {
          const animation = composerShell.animate(
            [
              { left: `${startRect.left}px`, top: `${startRect.top}px`, width: `${startRect.width}px` },
              { left: `${endRect.left}px`, top: `${endRect.top}px`, width: `${endRect.width}px` },
            ],
            { duration: 680, easing: "cubic-bezier(.22,1,.36,1)", fill: "forwards" }
          );

          let done = false;
          const finish = () => {
            if (done) return;
            done = true;
            animation.cancel();
            composerShell.classList.remove("composer-floating");
            composerShell.style.position = "";
            composerShell.style.left = "";
            composerShell.style.top = "";
            composerShell.style.width = "";
            dockSlot.appendChild(composerShell);
            introSlot.style.minHeight = "";
            app.classList.remove("is-transitioning");
            app.classList.add("is-chatting");
            isTransitioning = false;
            updateDockMetrics();
            toggleSendState();
            resolve();
          };

          animation.addEventListener("finish", finish, { once: true });
          setTimeout(finish, 760);
        });
      }

      function resetComposerToIntro() {
        introSlot.appendChild(composerShell);
        composerShell.classList.remove("composer-floating");
        composerShell.style.position = "";
        composerShell.style.left = "";
        composerShell.style.top = "";
        composerShell.style.width = "";
        introSlot.style.minHeight = "";
        app.classList.remove("is-transitioning", "is-chatting", "is-returning");
        closeStarterDropdown();
        closeAttachMenu();
        autoResize();
        toggleSendState();
        composerInput.focus();
      }

      function clearChat() {
        clearTimeout(typingTimeout);
        setRandomGreeting();
        isAwaitingResponse = false;
        isLockedUntilReplyFinishes = false;
        localStorage.removeItem(STORAGE_KEY);
        messages.innerHTML = "";
        composerInput.value = "";
        autoResize();
        closeStarterDropdown();
        closeAttachMenu();

        if (!isChatting() || isTransitioning) {
          isTransitioning = false;
          resetComposerToIntro();
          return;
        }

        isTransitioning = true;
        toggleSendState();

        const startRect = composerShell.getBoundingClientRect();
        introSlot.style.minHeight = `${Math.ceil(startRect.height)}px`;

        composerShell.classList.add("composer-floating");
        composerShell.style.left = `${startRect.left}px`;
        composerShell.style.top = `${startRect.top}px`;
        composerShell.style.width = `${startRect.width}px`;
        composerShell.style.position = "fixed";
        document.body.appendChild(composerShell);

        app.classList.remove("is-chatting");
        app.classList.add("is-returning");

        requestAnimationFrame(() => {
          const endRect = computeIntroRect();
          const animation = composerShell.animate(
            [
              { left: `${startRect.left}px`, top: `${startRect.top}px`, width: `${startRect.width}px` },
              { left: `${endRect.left}px`, top: `${endRect.top}px`, width: `${endRect.width}px` },
            ],
            { duration: 680, easing: "cubic-bezier(.22,1,.36,1)", fill: "forwards" }
          );

          let done = false;
          const finish = () => {
            if (done) return;
            done = true;
            animation.cancel();
            isTransitioning = false;
            resetComposerToIntro();
          };

          animation.addEventListener("finish", finish, { once: true });
          setTimeout(finish, 760);
        });
      }
    </script>

    <script>// ─── Markdown mínimo: convierte [texto](url) en <a> clickeable ───────────

      function renderMarkdown(text) {
        const div = document.createElement("div");

        // Escapar HTML base
        let safe = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

        // [texto](url) → <a href="url" target="_blank">texto</a>
        safe = safe.replace(
          /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
        );

        // URLs crudas sueltas → mostrar solo el hostname como texto
        safe = safe.replace(
          /(?<!\()(https?:\/\/[^\s<"&]+)/g,
          (url) => {
            try { return new URL(url).hostname; }
            catch { return ""; }
          }
        );

        // Saltos de línea → <br>
        safe = safe.replace(/\n/g, "<br>");

        div.innerHTML = safe;
        return div;
      }

      // ─── Comunicación con n8n ─────────────────────────────────────────────────

      async function showTypingAndReply(userText) {
        isAwaitingResponse = true;
        toggleSendState();

        const typingRow = appendMessage("assistant", "", { typing: true });

        try {
          const resp = await fetch(N8N_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: userText }),
          });

          const raw = await resp.text();

          if (!resp.ok) {
            throw new Error(`HTTP ${resp.status} - ${raw || "sin body"}`);
          }

          if (!raw.trim()) {
            throw new Error("n8n respondió 200 pero con body vacío");
          }

          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            throw new Error(`La respuesta no es JSON: ${raw}`);
          }

          const result = Array.isArray(data) ? data[0] : data;
          const replyText =
            result.reply || result.output || result.text || result.response || "Sin respuesta.";

          typingRow.remove();

          // Crear fila con contenido renderizado (markdown → HTML)
          const row = document.createElement("div");
          row.className = "message-row assistant";
          const bubble = document.createElement("div");
          bubble.className = "message-bubble";
          bubble.appendChild(renderMarkdown(replyText));
          row.appendChild(bubble);
          messages.appendChild(row);
          scrollToBottom();

        } catch (err) {
          console.error("Error real contra n8n:", err);
          typingRow.remove();
          appendMessage("assistant", `Error conectando con n8n: ${err.message}`);
        }

        saveMessages();
        isAwaitingResponse = false;
        isLockedUntilReplyFinishes = false;
        toggleSendState();
      }
    </script>

    <script>// ─── Submit del prompt ────────────────────────────────────────────────────

      async function submitPrompt() {
        const text = composerInput.value.trim();
        if (!text || isAwaitingResponse || isTransitioning || isLockedUntilReplyFinishes) return;

        isLockedUntilReplyFinishes = true;
        toggleSendState();
        closeStarterDropdown();
        closeAttachMenu();

        if (!isChatting()) {
          await transitionToChatMode();
        }

        appendMessage("user", text);
        saveMessages();
        composerInput.value = "";
        autoResize();
        composerInput.focus();

        await showTypingAndReply(text);
        toggleSendState();
      }

      // ─── Event listeners ──────────────────────────────────────────────────────

      composerForm.addEventListener("submit", (event) => {
        event.preventDefault();
        submitPrompt();
      });

      composerInput.addEventListener("input", () => {
        autoResize();
        toggleSendState();
      });

      composerInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          submitPrompt();
        }
      });

      starterButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (isChatting() || isTransitioning) return;
          toggleStarterDropdown(button.dataset.group);
        });
      });

      starterDropdownClose.addEventListener("click", closeStarterDropdown);

      attachBtn.addEventListener("click", () => {
        if (isTransitioning) return;
        toggleAttachMenu();
      });

      attachItems.forEach((item) => {
        item.addEventListener("click", () => {
          const type = item.dataset.attach;
          const prefix = type === "imagen" ? "[Imagen] " : "[Documento] ";
          const current = composerInput.value.trim();
          composerInput.value = current ? `${current} ${prefix}` : prefix;
          autoResize();
          toggleSendState();
          closeAttachMenu();
          composerInput.focus();
          composerInput.setSelectionRange(composerInput.value.length, composerInput.value.length);
        });
      });

      clearBtn.addEventListener("click", clearChat);

      document.addEventListener("click", (event) => {
        if (!composerShell.contains(event.target)) {
          closeAttachMenu();
        }

        const insideStarter =
          starterDropdown.contains(event.target) ||
          starterButtons.some((button) => button.contains(event.target));
        if (!insideStarter) {
          closeStarterDropdown();
        }
      });

      window.addEventListener("resize", () => {
        updateDockMetrics();
        if (!isChatting() && !isTransitioning) return;
        scrollToBottom();
      });

      // ─── Init ─────────────────────────────────────────────────────────────────

      setRandomGreeting();
      loadMessages();
      updateDockMetrics();
      window.addEventListener("load", updateDockMetrics);
    </script>
